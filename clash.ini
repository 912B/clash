custom_proxy_group=fallback`fallback`.*`https://www.google.cn/generate_204`300
#custom_proxy_group=2倍`url-test`(2.0)`https://www.google.cn/generate_204`300
#custom_proxy_group=3倍`url-test`(3.0|IPLC)`https://www.google.cn/generate_204`300
custom_proxy_group=直连`select`[]DIRECT
#custom_proxy_group=节点选择`select`(^(?!.*(美国|日本)).*)  # 表示创建一个叫 节点选择 的 select 策略组,并向其中**依次**添加名字不包含'美国'或'日本'的节点
#custom_proxy_group=香港节点`select`(^(?!.*?(3.0)).*(港|HK|Hong Kong) )  #不包含3.0 包含港的节点
;设置分组标志位

enable_rule_generator=true
overwrite_original_rules=true

